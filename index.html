<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f172a">
<title>Mileage Logger</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #0f172a;
    --navy-mid: #1e293b;
    --navy-light: #334155;
    --accent: #38bdf8;
    --accent-dim: #0ea5e9;
    --text: #f1f5f9;
    --text-muted: #94a3b8;
    --text-dim: #64748b;
    --surface: #1e293b;
    --surface2: #263348;
    --border: rgba(148,163,184,0.12);
    --success: #4ade80;
    --error: #f87171;
    --radius: 16px;
    --radius-sm: 10px;
  }

  html, body {
    height: 100%;
    background: var(--navy);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    min-height: -webkit-fill-available;
  }

  .app {
    flex: 1;
    display: flex;
    flex-direction: column;
    max-width: 480px;
    margin: 0 auto;
    width: 100%;
    padding: env(safe-area-inset-top, 20px) 20px env(safe-area-inset-bottom, 20px);
  }

  /* Header */
  .header {
    padding: 24px 0 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header-left { display: flex; align-items: center; gap: 12px; }

  .logo-mark {
    width: 42px; height: 42px;
    background: linear-gradient(135deg, var(--accent), var(--accent-dim));
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
  }

  .logo-mark svg { width: 22px; height: 22px; }

  .header-title { font-size: 17px; font-weight: 600; color: var(--text); }
  .header-sub { font-size: 12px; color: var(--text-muted); margin-top: 1px; }

  .user-pill {
    display: flex; align-items: center; gap: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 10px 5px 6px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .user-pill:hover { background: var(--surface2); }
  .user-avatar {
    width: 24px; height: 24px; border-radius: 50%;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; color: var(--navy);
  }
  .user-pill-name { font-size: 12px; color: var(--text-muted); max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* Sign in screen */
  #signin-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 12px;
    padding-bottom: 60px;
  }

  .signin-icon {
    width: 80px; height: 80px;
    background: var(--surface);
    border-radius: 24px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 8px;
    border: 1px solid var(--border);
  }

  .signin-icon svg { width: 40px; height: 40px; }

  #signin-screen h2 { font-size: 22px; font-weight: 700; }
  #signin-screen p { font-size: 14px; color: var(--text-muted); line-height: 1.6; max-width: 280px; }

  .google-btn {
    display: flex; align-items: center; gap: 10px;
    background: #fff;
    color: #1f1f1f;
    border: none;
    border-radius: 12px;
    padding: 14px 24px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 12px;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    width: 100%;
    max-width: 300px;
    justify-content: center;
  }
  .google-btn:active { transform: scale(0.97); }

  /* Main app */
  #main-screen { flex: 1; display: none; flex-direction: column; gap: 14px; }

  /* Date card */
  .date-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .date-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); margin-bottom: 4px; }
  .date-value { font-size: 15px; font-weight: 500; color: var(--text); }
  .date-time { font-size: 22px; font-weight: 700; color: var(--accent); letter-spacing: -0.5px; }

  /* Input cards */
  .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .input-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    transition: border-color 0.2s;
  }
  .input-card:focus-within { border-color: var(--accent); }

  .input-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); margin-bottom: 8px; }

  .mileage-input {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    font-size: 26px;
    font-weight: 700;
    color: var(--text);
    font-family: inherit;
    -moz-appearance: textfield;
  }
  .mileage-input::-webkit-outer-spin-button,
  .mileage-input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .mileage-input::placeholder { color: var(--text-dim); font-weight: 400; font-size: 20px; }

  /* Diff card */
  .diff-card {
    background: linear-gradient(135deg, #0c4a6e 0%, #0f172a 100%);
    border: 1px solid rgba(56,189,248,0.25);
    border-radius: var(--radius);
    padding: 20px;
    display: flex; align-items: center; justify-content: space-between;
  }

  .diff-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: rgba(148,163,184,0.7); margin-bottom: 6px; }
  .diff-value { font-size: 42px; font-weight: 800; color: var(--accent); letter-spacing: -1px; line-height: 1; }
  .diff-unit { font-size: 14px; color: var(--text-muted); margin-top: 4px; }
  .diff-icon { opacity: 0.15; }
  .diff-icon svg { width: 56px; height: 56px; }

  /* Submit button */
  .submit-btn {
    width: 100%;
    padding: 18px;
    background: var(--accent);
    color: var(--navy);
    border: none;
    border-radius: var(--radius);
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.2s, background 0.2s;
    letter-spacing: 0.01em;
    margin-top: 4px;
  }
  .submit-btn:not(:disabled):active { transform: scale(0.97); }
  .submit-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  /* Status toast */
  .toast {
    position: fixed;
    bottom: calc(env(safe-area-inset-bottom, 0px) + 24px);
    left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 20px;
    font-size: 14px;
    font-weight: 500;
    white-space: nowrap;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
    opacity: 0;
    z-index: 100;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  .toast.success { border-color: rgba(74,222,128,0.3); color: var(--success); }
  .toast.error { border-color: rgba(248,113,113,0.3); color: var(--error); }
  .toast.info { border-color: rgba(56,189,248,0.3); color: var(--accent); }

  /* History section */
  .section-title {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--text-dim); margin-top: 8px; margin-bottom: 10px;
  }

  .history-list { display: flex; flex-direction: column; gap: 8px; }

  .history-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .history-date { font-size: 12px; color: var(--text-muted); }
  .history-miles { font-size: 16px; font-weight: 700; color: var(--accent); }
  .history-range { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

  .empty-history { text-align: center; color: var(--text-dim); font-size: 13px; padding: 20px 0; }

  /* Spinner */
  .spinner {
    display: inline-block; width: 18px; height: 18px;
    border: 2px solid rgba(15,23,42,0.3);
    border-top-color: var(--navy);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="header-left">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="#0f172a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 17H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11a2 2 0 0 1 2 2v3"/>
          <rect x="9" y="11" width="14" height="10" rx="2"/>
          <circle cx="12" cy="16" r="1"/><circle cx="20" cy="16" r="1"/>
        </svg>
      </div>
      <div>
        <div class="header-title">Mileage Logger</div>
        <div class="header-sub">Ionmas Ltd · Lease Car</div>
      </div>
    </div>
    <div id="user-pill" class="user-pill" style="display:none" onclick="signOut()">
      <div class="user-avatar" id="user-initial">D</div>
      <span class="user-pill-name" id="user-name-label">Daniel</span>
    </div>
  </div>

  <!-- Sign in -->
  <div id="signin-screen">
    <div class="signin-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round">
        <path d="M9 20H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
    </div>
    <h2>Sign in to start</h2>
    <p>Connect your Google account to save journey logs directly to Google Sheets.</p>
    <button class="google-btn" onclick="signIn()">
      <svg width="18" height="18" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      Sign in with Google
    </button>
  </div>

  <!-- Main app -->
  <div id="main-screen">

    <div class="date-card">
      <div>
        <div class="date-label">Today</div>
        <div class="date-value" id="date-str">—</div>
      </div>
      <div class="date-time" id="time-str">—</div>
    </div>

    <div class="input-row">
      <div class="input-card">
        <div class="input-label">Start mileage</div>
        <input class="mileage-input" type="number" id="start-mi" placeholder="0" inputmode="numeric" oninput="calcDiff()">
      </div>
      <div class="input-card">
        <div class="input-label">End mileage</div>
        <input class="mileage-input" type="number" id="end-mi" placeholder="0" inputmode="numeric" oninput="calcDiff()">
      </div>
    </div>

    <div class="diff-card">
      <div>
        <div class="diff-label">Miles travelled</div>
        <div class="diff-value" id="diff-val">—</div>
        <div class="diff-unit" id="diff-unit">enter mileage above</div>
      </div>
      <div class="diff-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 8v4l3 3"/>
        </svg>
      </div>
    </div>

    <button class="submit-btn" id="submit-btn" onclick="submitEntry()" disabled>
      Log Journey
    </button>

    <div class="section-title">Recent journeys</div>
    <div class="history-list" id="history-list">
      <div class="empty-history">No journeys logged yet</div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const CLIENT_ID = '2381011763-3m0eedesk4r4oa6sfpbsepf33fahvp6l.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/userinfo.profile';
const SHEET_NAME = 'Lease Car Mileage';
const REDIRECT_URI = window.location.href.split('?')[0].split('#')[0];

let accessToken = null;
let sheetId = null;
let history = JSON.parse(localStorage.getItem('mileage_history') || '[]');

// Clock
function updateClock() {
  const now = new Date();
  document.getElementById('date-str').textContent = now.toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'long', year:'numeric' });
  document.getElementById('time-str').textContent = now.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
}
setInterval(updateClock, 1000);
updateClock();

// Diff calculator
function calcDiff() {
  const s = parseFloat(document.getElementById('start-mi').value);
  const e = parseFloat(document.getElementById('end-mi').value);
  const btn = document.getElementById('submit-btn');
  if (!isNaN(s) && !isNaN(e) && e > s) {
    const d = Math.round(e - s);
    document.getElementById('diff-val').textContent = d.toLocaleString();
    document.getElementById('diff-unit').textContent = d === 1 ? 'mile' : 'miles';
    btn.disabled = false;
  } else if (!isNaN(s) && !isNaN(e) && e <= s) {
    document.getElementById('diff-val').textContent = '!';
    document.getElementById('diff-unit').textContent = 'end must be greater than start';
    btn.disabled = true;
  } else {
    document.getElementById('diff-val').textContent = '—';
    document.getElementById('diff-unit').textContent = 'enter mileage above';
    btn.disabled = true;
  }
}

// Toast
let toastTimer;
function showToast(msg, type='info') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = 'toast'; }, 3500);
}

// Auth
function signIn() {
  const params = new URLSearchParams({
    client_id: CLIENT_ID,
    redirect_uri: REDIRECT_URI,
    response_type: 'token',
    scope: SCOPES,
    include_granted_scopes: 'true'
  });
  window.location.href = 'https://accounts.google.com/o/oauth2/v2/auth?' + params;
}

function signOut() {
  if (!confirm('Sign out?')) return;
  accessToken = null;
  sheetId = null;
  sessionStorage.removeItem('mileage_token');
  document.getElementById('signin-screen').style.display = '';
  document.getElementById('main-screen').style.display = 'none';
  document.getElementById('user-pill').style.display = 'none';
}

async function getUserInfo() {
  const r = await fetch('https://www.googleapis.com/oauth2/v1/userinfo?alt=json', {
    headers: { Authorization: 'Bearer ' + accessToken }
  });
  const d = await r.json();
  const name = d.given_name || d.name || 'User';
  document.getElementById('user-name-label').textContent = name;
  document.getElementById('user-initial').textContent = name[0].toUpperCase();
  document.getElementById('user-pill').style.display = 'flex';
}

function handleToken(token) {
  accessToken = token;
  sessionStorage.setItem('mileage_token', token);
  document.getElementById('signin-screen').style.display = 'none';
  document.getElementById('main-screen').style.display = 'flex';
  document.getElementById('main-screen').style.flexDirection = 'column';
  getUserInfo();
  renderHistory();
  getOrCreateSheet();
}

// Google Sheets
async function getOrCreateSheet() {
  const stored = localStorage.getItem('mileage_sheet_id');
  if (stored) { sheetId = stored; return; }
  showToast('Creating your Google Sheet...', 'info');
  try {
    const r = await fetch('https://sheets.googleapis.com/v4/spreadsheets', {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        properties: { title: SHEET_NAME },
        sheets: [{ properties: { title: 'Mileage Log' } }]
      })
    });
    const d = await r.json();
    sheetId = d.spreadsheetId;
    localStorage.setItem('mileage_sheet_id', sheetId);
    await addHeaderRow();
    showToast('Sheet created in Google Drive!', 'success');
  } catch(e) {
    showToast('Could not create sheet: ' + e.message, 'error');
  }
}

async function addHeaderRow() {
  await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/A1:D1?valueInputOption=RAW`, {
    method: 'PUT',
    headers: { Authorization: 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
    body: JSON.stringify({ values: [['Date & Time', 'Starting Mileage', 'Ending Mileage', 'Miles Travelled']] })
  });
}

async function appendRow(row) {
  const r = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/A:D:append?valueInputOption=RAW&insertDataOption=INSERT_ROWS`, {
    method: 'POST',
    headers: { Authorization: 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
    body: JSON.stringify({ values: [row] })
  });
  if (!r.ok) throw new Error('Sheet write failed');
}

async function submitEntry() {
  const s = parseFloat(document.getElementById('start-mi').value);
  const e = parseFloat(document.getElementById('end-mi').value);
  if (isNaN(s) || isNaN(e) || e <= s) return;
  const diff = Math.round(e - s);
  const now = new Date();
  const dateStr = now.toLocaleString('en-GB');

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';

  try {
    if (!sheetId) await getOrCreateSheet();
    await appendRow([dateStr, s, e, diff]);
    const entry = { date: dateStr, start: s, end: e, diff };
    history.unshift(entry);
    if (history.length > 10) history = history.slice(0, 10);
    localStorage.setItem('mileage_history', JSON.stringify(history));
    renderHistory();
    document.getElementById('start-mi').value = '';
    document.getElementById('end-mi').value = '';
    calcDiff();
    showToast('Journey logged — ' + diff + ' miles saved!', 'success');
  } catch(err) {
    showToast('Error saving: ' + err.message, 'error');
  }

  btn.disabled = false;
  btn.textContent = 'Log Journey';
}

function renderHistory() {
  const list = document.getElementById('history-list');
  if (!history.length) {
    list.innerHTML = '<div class="empty-history">No journeys logged yet</div>';
    return;
  }
  list.innerHTML = history.slice(0, 5).map(h => `
    <div class="history-item">
      <div>
        <div class="history-date">${h.date}</div>
        <div class="history-range">${h.start.toLocaleString()} → ${h.end.toLocaleString()}</div>
      </div>
      <div>
        <div class="history-miles">${h.diff.toLocaleString()}</div>
        <div class="history-range" style="text-align:right">miles</div>
      </div>
    </div>
  `).join('');
}

// Init — check for token in URL hash (after Google redirect)
(function init() {
  const hash = window.location.hash;
  if (hash) {
    const params = new URLSearchParams(hash.replace('#',''));
    const token = params.get('access_token');
    if (token) {
      handleToken(token);
      history.replaceState(null, '', window.location.pathname);
      return;
    }
  }
  const stored = sessionStorage.getItem('mileage_token');
  if (stored) { handleToken(stored); return; }
})();
</script>

<!-- PWA manifest inline -->
<script>
const manifest = {
  name: 'Mileage Logger',
  short_name: 'Mileage',
  description: 'Lease car mileage tracker for Ionmas Ltd',
  start_url: window.location.href,
  display: 'standalone',
  background_color: '#0f172a',
  theme_color: '#0f172a',
  icons: [{
    src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='40' fill='%230f172a'/%3E%3Cpath d='M40 130h-16a16 16 0 0 1-16-16V50a16 16 0 0 1 16-16h88a16 16 0 0 1 16 16v24' stroke='%2338bdf8' stroke-width='16' stroke-linecap='round' fill='none'/%3E%3Crect x='72' y='88' width='112' height='80' rx='16' stroke='%2338bdf8' stroke-width='16' fill='none'/%3E%3Ccircle cx='96' cy='128' r='8' fill='%2338bdf8'/%3E%3Ccircle cx='160' cy='128' r='8' fill='%2338bdf8'/%3E%3C/svg%3E",
    sizes: '192x192', type: 'image/svg+xml'
  }]
};
const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
const url = URL.createObjectURL(blob);
const link = document.createElement('link');
link.rel = 'manifest'; link.href = url;
document.head.appendChild(link);
</script>

</body>
</html>
